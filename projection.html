<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>♪ Lyric Projector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #000000;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      cursor: none;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    
    /* Container da legenda - parte inferior da tela */
    #subtitle-area {
      width: 100%;
      padding: 2vw 6vw 4vw;
      text-align: center;
    }
    
    /* Linha ativa */
    #active-line {
      color: #FFFFFF;
      font-size: clamp(2rem, 5vw, 5rem);
      font-weight: 700;
      line-height: 1.3;
      text-shadow: 0 0 30px rgba(255,255,255,0.15);
      transition: opacity 0.3s ease;
      margin-bottom: 0.5em;
    }
    
    /* Tradução */
    #active-translation {
      color: rgba(255, 255, 255, 0.6);
      font-size: clamp(1.2rem, 3vw, 3rem);
      font-weight: 400;
      font-style: italic;
      line-height: 1.3;
      transition: opacity 0.3s ease;
      margin-bottom: 0.8em;
    }
    
    /* Próxima linha (preview) */
    #next-line {
      color: rgba(255, 255, 255, 0.3);
      font-size: clamp(1.5rem, 3.5vw, 3.5rem);
      font-weight: 500;
      line-height: 1.3;
      transition: opacity 0.3s ease;
    }
    
    /* Esconde cursor após 3 seg */
    body.cursor-visible { cursor: default; }
    
    /* ========================================
       MODO HUD PARABRISA (espelhado)
       Ativa com tecla H
       ======================================== */
    body.mirror-mode #subtitle-area {
      transform: scaleX(-1);
    }
    body.mirror-mode #active-line {
      font-weight: 900;
      font-size: clamp(3rem, 7vw, 7rem);
      text-shadow: 0 0 20px rgba(255,255,255,0.5);
    }
    body.mirror-mode #active-translation {
      display: none; /* Remove tradução no modo HUD para simplificar */
    }
    body.mirror-mode #next-line {
      display: none; /* Remove próxima linha no modo HUD */
    }
  </style>
</head>
<body>
  <div id="subtitle-area">
    <div id="active-line">Aguardando letra...</div>
    <div id="active-translation"></div>
    <div id="next-line"></div>
  </div>

  <script>
    const channel = new BroadcastChannel('lyric-projector');
    const activeLineEl = document.getElementById('active-line');
    const activeTranslationEl = document.getElementById('active-translation');
    const nextLineEl = document.getElementById('next-line');

    // Recebe letras da aba principal via BroadcastChannel
    channel.onmessage = (event) => {
      if (event.data.type === 'lyric-update') {
        activeLineEl.textContent = event.data.activeLine || '';
        activeTranslationEl.textContent = event.data.activeTranslation || '';
        nextLineEl.textContent = event.data.nextLine || '';
      }
    };

    // Auto-hide cursor após 3 segundos
    let cursorTimer;
    document.addEventListener('mousemove', () => {
      document.body.classList.add('cursor-visible');
      clearTimeout(cursorTimer);
      cursorTimer = setTimeout(() => document.body.classList.remove('cursor-visible'), 3000);
    });

    // Atalhos de teclado
    document.addEventListener('keydown', (e) => {
      // F ou F11 = fullscreen
      if (e.key === 'f' || e.key === 'F11') {
        e.preventDefault();
        if (document.fullscreenElement) {
          document.exitFullscreen?.();
        } else {
          document.documentElement.requestFullscreen?.();
        }
      }
      // H = modo HUD espelhado (parabrisa)
      if (e.key === 'h' || e.key === 'H') {
        document.body.classList.toggle('mirror-mode');
      }
      // Escape = sair do fullscreen
      if (e.key === 'Escape') {
        document.exitFullscreen?.();
      }
    });

    // Clique na tela = fullscreen (primeira interação)
    document.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen?.();
      }
    });

    // Wake Lock - impede a tela de apagar
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          await navigator.wakeLock.request('screen');
          console.log('[Lyric Projector] Wake Lock ativo - tela não vai apagar');
        }
      } catch (e) {
        console.log('[Lyric Projector] Wake Lock não disponível');
      }
    }
    requestWakeLock();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });
  </script>
</body>
</html>
