<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>♪ Lyric Projector</title>
  <style>
    :root {
      --font-size: 5rem;
      --brightness: 100%;
      --accent-color: #FFFFFF;
      --bg-color: #000000;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--bg-color);
      color: #FFFFFF;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      cursor: none;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      filter: brightness(var(--brightness));
      transition: background 0.5s;
    }
    
    /* Container da legenda */
    #subtitle-area {
      width: 100%;
      padding: 2vw 6vw;
      text-align: center;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
    }
    #subtitle-area.visible { opacity: 1; }
    
    #active-line {
      color: var(--accent-color);
      font-size: var(--font-size);
      font-weight: 700;
      line-height: 1.2;
      text-shadow: 0 0 20px rgba(255,255,255,0.2);
      margin-bottom: 0.3em;
    }
    
    #active-translation {
      color: rgba(255, 255, 255, 0.5);
      font-size: calc(var(--font-size) * 0.6);
      font-weight: 400;
      font-style: italic;
      margin-bottom: 0.5em;
    }
    
    #next-line {
      color: rgba(255, 255, 255, 0.2);
      font-size: calc(var(--font-size) * 0.5);
      font-weight: 500;
    }
    
    /* Barra de Progresso */
    #progress-container {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 3px;
      background: rgba(255,255,255,0.1);
    }
    #progress-bar {
      height: 100%; background: var(--accent-color); width: 0%;
      transition: width 0.3s linear; box-shadow: 0 0 10px var(--accent-color);
    }

    /* Logo Standby */
    #standby-logo {
      position: absolute; font-size: 5rem; opacity: 0.2; transition: opacity 1s;
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
    }
    #standby-logo.hidden { opacity: 0; pointer-events: none; }
    #standby-logo span { font-size: 1.5rem; letter-spacing: 5px; }

    /* Overlay de Ajustes */
    #settings-overlay {
      position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px); padding: 20px; border-radius: 15px;
      border: 1px solid rgba(255,255,255,0.1); width: 250px;
      transform: translateX(300px); transition: transform 0.3s;
      z-index: 100; cursor: default;
    }
    body.cursor-visible #settings-overlay { transform: translateX(0); }
    
    .setting-item { margin-bottom: 15px; }
    .setting-item label { display: block; font-size: 12px; color: #999; margin-bottom: 5px; }
    .setting-item input[type="range"] { width: 100%; accent-color: var(--primary); }
    
    #cast-btn {
      background: none; border: none; color: white; cursor: pointer;
      opacity: 0.5; transition: opacity 0.2s; display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 10px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 10px;
    }
    #cast-btn:hover { opacity: 1; }

    /* HUD Mode */
    body.mirror-mode #subtitle-area { transform: scaleX(-1); }
    
    /* Custom CSS Injection Area */
    #custom-styles-container {}
  </style>
  <style id="user-custom-css"></style>
</head>
<body class="cursor-visible">
  <div id="standby-logo">
    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
    <span>PRONTO PARA TOCAR</span>
  </div>

  <div id="subtitle-area">
    <div id="active-line"></div>
    <div id="active-translation"></div>
    <div id="next-line"></div>
  </div>

  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>

  <div id="settings-overlay">
    <div class="setting-item">
      <label>Tamanho da Letra</label>
      <input type="range" id="size-slider" min="2" max="10" step="0.1" value="5">
    </div>
    <div class="setting-item">
      <label>Brilho da Tela</label>
      <input type="range" id="brightness-slider" min="10" max="150" value="100">
    </div>
    <div class="setting-item">
      <label>Cor de Destaque</label>
      <input type="color" id="color-picker" value="#FFFFFF">
    </div>
    <button id="cast-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-6"></path><path d="M2 12a9 9 0 0 1 8 8"></path><path d="M2 16a5 5 0 0 1 4 4"></path><line x1="2" y1="20" x2="2.01" y2="20"></line></svg>
      Transmitir Tela
    </button>
  </div>

  <script src="projection.js"></script>
</body>
</html>
