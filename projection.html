<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>♪ Lyric Projector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #000000;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      cursor: none;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    
    /* Container da legenda - parte inferior da tela */
    #subtitle-area {
      width: 100%;
      padding: 2vw 6vw 4vw;
      text-align: center;
    }
    
    /* Linha ativa */
    #active-line {
      color: #FFFFFF;
      font-size: clamp(2rem, 5vw, 5rem);
      font-weight: 700;
      line-height: 1.3;
      text-shadow: 0 0 30px rgba(255,255,255,0.15);
      transition: opacity 0.3s ease;
      margin-bottom: 0.5em;
    }
    
    /* Tradução */
    #active-translation {
      color: rgba(255, 255, 255, 0.6);
      font-size: clamp(1.2rem, 3vw, 3rem);
      font-weight: 400;
      font-style: italic;
      line-height: 1.3;
      transition: opacity 0.3s ease;
      margin-bottom: 0.8em;
    }
    
    /* Próxima linha (preview) */
    #next-line {
      color: rgba(255, 255, 255, 0.3);
      font-size: clamp(1.5rem, 3.5vw, 3.5rem);
      font-weight: 500;
      line-height: 1.3;
      transition: opacity 0.3s ease;
    }
    
    /* Esconde cursor após 3 seg */
    body.cursor-visible { cursor: default; }
    
    /* ========================================
       MODO HUD PARABRISA (espelhado)
       Ativa com tecla H
       ======================================== */
    body.mirror-mode #subtitle-area {
      transform: scaleX(-1);
    }
    body.mirror-mode #active-line {
      font-weight: 900;
      font-size: clamp(3rem, 7vw, 7rem);
      text-shadow: 0 0 20px rgba(255,255,255,0.5);
    }
    body.mirror-mode #active-translation {
      display: none; /* Remove tradução no modo HUD para simplificar */
    }
    body.mirror-mode #next-line {
      display: none; /* Remove próxima linha no modo HUD */
    }
  </style>
</head>
<body>
  <div id="subtitle-area">
    <div id="active-line">Aguardando letra...</div>
    <div id="active-translation"></div>
    <div id="next-line"></div>
  </div>

  <script src="projection.js"></script>
</body>
</html>
